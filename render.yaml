services:
  - type: web
    name: news-auto-wp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WORDPRESS_URL
        value: https://enriquevirgen.com
      - key: WORDPRESS_USER
        value: qwerty123321
      - key: WORDPRESS_STATUS
        value: publish
      - key: CHECK_INTERVAL_MINUTES
        value: 5
      - key: REQUIRE_IMAGE
        value: true
      - key: DATE_FILTER_ENABLED
        value: false
      - key: MAX_ARTICLE_AGE_HOURS
        value: 0
      - key: SKIP_UNDATED_ARTICLES
        value: false
