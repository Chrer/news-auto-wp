services:
  - type: web
    name: news-auto-wp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WORDPRESS_URL
        value: https://enriquevirgen.com
      - key: WORDPRESS_USER
        value: qwerty123321
      - key: WORDPRESS_STATUS
        value: publish
      - key: RUN_ON_START
        value: false
      - key: CHECK_INTERVAL_MINUTES
        value: 5
      - key: MAX_POSTS_PER_RUN
        value: 1
      - key: COPY_FULL_ARTICLE
        value: true
      - key: PARAPHRASE_ARTICLE
        value: true
      - key: PARAPHRASE_MODE
        value: coherent
      - key: UPLOAD_FEATURED_IMAGE
        value: true
      - key: REQUIRE_IMAGE
        value: true
      - key: DATE_FILTER_ENABLED
        value: false
      - key: SKIP_UNDATED_ARTICLES
        value: false
      - key: INCLUDE_SOURCE_LINK
        value: false
      - key: SMART_CLEAN_CONTENT
        value: true
