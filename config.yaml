category_rules:
  - category: Policiaca
    keywords: [policiaca, seguridad, detenido, asesinado, homicidio, balacera, violencia, accidente, fiscalía, policía, cárcel, desaparecido, levantan]
  - category: Economía
    keywords: [economía, infonavit, dólar, peso, finanzas, precio, banco, crédito, empleo, canasta básica, casetas, peaje]
  - category: Ciencia y Tecnología
    keywords: [tecnología, ciencia, investigación, app, internet, redes sociales, nasa, inteligencia artificial, celular, software, astronomía, salud, medicina]
  - category: Internacional
    keywords: [internacional, estados unidos, brasil, argentina, mundo, europa, china, rusia, trump, biden, francia, ucrania, israel, gaza]
  - category: Opinión
    keywords: [opinión, columna, editorial]
  - category: Deportes
    keywords: [deportes, futbol, fútbol, beisbol, béisbol, mundialito, campeón, liga, torneo, partido]
  - category: Clima
    keywords: [clima, lluvia, lluvias, huracán, tormenta, temperatura, pronóstico, calor, frío]
  - category: Política
    keywords: [política, morena, sheinbaum, rocha, gobierno, gobernador, alcalde, congreso, partido, fgr]
  - category: Sinaloa
    keywords: [sinaloa, culiacán, mazatlán, mochis, ahome, guasave, navolato, el fuerte]
  - category: Nacional
    keywords: [nacional, méxico, gobierno federal, república]

runtime_rules:
  max_posts_per_run: 1
  require_image: true
  add_original_link: false
  date_filter_enabled: false
  smart_clean_content: true
  tags_to_wordpress: true
  paraphrase_article: true
  paraphrase_mode: coherent
  single_target_category_publish: true
  lee_ahora_cleaner: true
  infer_category_if_unclear: true
  live_process_panel: true
  url_category_detection: true
  strict_category_feed_filter: true
  in_run_duplicate_protection: true
  luz_noticias_special_extractor: true
