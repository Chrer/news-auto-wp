  - Ciencia y Tecnología
  - Clima
  - Deportes
  - Economía
  - Internacional
  - Nacional
  - Opinión
  - Policiaca
  - Política
  - Sinaloa


# Autor de WordPress por categoría destino.
# Usa /api/wp-authors para ver los IDs reales de tus usuarios en WordPress.
# Si una categoría no tiene autor o el ID es inválido, WordPress usará el usuario conectado por la API.
category_authors:
  "Política": 4
  "Ciencia y Tecnología": 5
  "Policiaca": 6
  "Deportes": 7
  "Economía": 8
  "Nacional": 2
  "Internacional": 6
  "Sinaloa": 6
  "Clima": 5
  "Opinión": 2

